<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="240" fill="url(#shine)"/>

  <!-- Trophy body -->
  <g filter="shadow">
    <!-- Cup body -->
    <path d="M176 140 h160 l-20 160 c-2 16-16 28-32 28 h-56 c-16 0-30-12-32-28 Z" 
          fill="url(#gold)" stroke="#d97706" stroke-width="3"/>
    
    <!-- Left handle -->
    <path d="M176 160 c-40 0-60 20-60 50 c0 35 25 55 60 55" 
          fill="none" stroke="url(#gold)" stroke-width="16" stroke-linecap="round"/>
    
    <!-- Right handle -->
    <path d="M336 160 c40 0 60 20 60 50 c0 35-25 55-60 55" 
          fill="none" stroke="url(#gold)" stroke-width="16" stroke-linecap="round"/>
    
    <!-- Cup rim -->
    <rect x="168" y="132" width="176" height="16" rx="8" fill="#fbbf24"/>
    
    <!-- Cup highlight -->
    <path d="M200 155 l-8 100 c0 0 15-20 70-20 s60 20 60 20 l-8-100 Z" 
          fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Star on trophy -->
  <g filter="glow" transform="translate(256,220)">
    <polygon points="0,-28 8,-10 28,-10 12,4 18,24 0,12 -18,24 -12,4 -28,-10 -8,-10" 
             fill="white" opacity="0.95"/>
  </g>

  <!-- Base -->
  <g filter="shadow">
    <rect x="210" y="328" width="92" height="16" rx="4" fill="#d97706"/>
    <rect x="194" y="344" width="124" height="20" rx="6" fill="url(#gold)" stroke="#d97706" stroke-width="2"/>
    <rect x="186" y="364" width="140" height="24" rx="8" fill="#d97706"/>
    <!-- Base shine -->
    <rect x="194" y="344" width="124" height="10" rx="5" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Score digits on trophy -->
  <g font-family="monospace" font-weight="900" font-size="36" fill="#7c3aed" text-anchor="middle">
    <text x="232" y="280">1</text>
    <text x="256" y="275" font-size="10" fill="#a78bfa">-</text>
    <text x="280" y="280">0</text>
  </g>

  <!-- Sparkles -->
  <g fill="#fbbf24" filter="glow">
    <circle cx="130" cy="120" r="6"/>
    <circle cx="382" cy="120" r="4"/>
    <circle cx="110" cy="300" r="5"/>
    <circle cx="400" cy="280" r="6"/>
    <circle cx="150" cy="400" r="4"/>
    <circle cx="370" cy="390" r="5"/>
  </g>

  <!-- Small stars -->
  <g fill="white" opacity="0.7">
    <polygon points="130,120 133,126 140,126 135,130 137,137 130,133 123,137 125,130 120,126 127,126" transform="scale(0.6) translate(85,75)"/>
    <polygon points="382,120 385,126 392,126 387,130 389,137 382,133 375,137 377,130 372,126 379,126" transform="scale(0.5) translate(380,115)"/>
  </g>
</svg>
